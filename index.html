<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Caller</title>
    <style>
      :root {
        --bg: #f6f7f4;
        --ink: #1f2a2e;
        --accent: #0d9488;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 15%, #d6f5ef 0%, transparent 40%),
          radial-gradient(circle at 85% 85%, #e9f8d3 0%, transparent 35%),
          var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid #d5dddb;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 16px 30px rgba(17, 24, 39, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 2.5vw, 2.1rem);
      }

      p {
        margin: 0 0 10px;
        line-height: 1.5;
      }

      .pill {
        display: inline-block;
        margin-top: 8px;
        background: #e6f8f5;
        color: #0f766e;
        border: 1px solid #a7f3d0;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.86rem;
      }

      code {
        background: #f2f5f7;
        border: 1px solid #d7e0e6;
        border-radius: 7px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Service Caller</h1>
      <p>This Netlify site runs a scheduled function that pings your backend and AI services every 12 minutes.</p>
      <p>Scheduler endpoint: <code>/netlify/functions/keep-alive</code></p>
      <p class="pill">Schedule: every 12 minutes</p>
    </main>
  </body>
</html>
